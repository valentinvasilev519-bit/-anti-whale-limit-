name: Anti-Whale & Gas Oracle Deploy
on:
  push:
    branches: [ main ] # Автоматично при всяка промяна

jobs:
  deploy-to-cloud:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4 # Използваме най-новата версия

    - name: Google Auth
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }} # Твоят ключ!

    - name: Run Unified Logic
      run: python main.py # Стартира обединения Dashboard и Oracle

